##############################################################
# .github/workflows/terraform.yml
#
# Triggers:
#   PR  → terraform plan  (comment plan output on PR)
#   Push to main → terraform apply (dev auto, staging/prod manual gate)
##############################################################

name: "Terraform"

on:
  pull_request:
    branches: [main]
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "ap-south-1"

jobs:
  # ── Detect which environments changed ──────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev:     ${{ steps.filter.outputs.dev }}
      staging: ${{ steps.filter.outputs.staging }}
      prod:    ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev:
              - 'terraform/environments/dev/**'
              - 'terraform/modules/**'
            staging:
              - 'terraform/environments/staging/**'
              - 'terraform/modules/**'
            prod:
              - 'terraform/environments/prod/**'
              - 'terraform/modules/**'

  # ── Lint / validate all environments (runs on every PR) ────
  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
        working-directory: terraform/environments/${{ matrix.environment }}
      - run: terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
      - run: terraform fmt -check -recursive
        working-directory: terraform

  # ── Plan — post comment on PR ───────────────────────────────
  plan:
    name: Plan (${{ matrix.environment }})
    needs: [detect-changes, validate]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -input=false
      - name: Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -input=false -no-color \
            -var="ec2_public_key=${{ secrets[format('EC2_PUBLIC_KEY_{0}', upper(matrix.environment))] }}" \
            2>&1 | tee /tmp/plan.txt
        continue-on-error: true
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📋 Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`\n${plan}\n\`\`\``
            });
      - if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Apply Dev (auto on merge to main) ───────────────────────
  apply-dev:
    name: "Apply → dev"
    needs: detect-changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.dev == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -input=false
        working-directory: terraform/environments/dev
      - run: |
          terraform apply -auto-approve -input=false \
            -var="ec2_public_key=${{ secrets.EC2_PUBLIC_KEY_DEV }}"
        working-directory: terraform/environments/dev

  # ── Apply Staging (manual approval gate) ────────────────────
  apply-staging:
    name: "Apply → staging"
    needs: [detect-changes, apply-dev]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.staging == 'true'
    runs-on: ubuntu-latest
    environment: staging      # set required reviewers in GitHub → Settings → Environments
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -input=false
        working-directory: terraform/environments/staging
      - run: |
          terraform apply -auto-approve -input=false \
            -var="ec2_public_key=${{ secrets.EC2_PUBLIC_KEY_STAGING }}"
        working-directory: terraform/environments/staging

  # ── Apply Prod (manual approval gate) ───────────────────────
  apply-prod:
    name: "Apply → prod"
    needs: [detect-changes, apply-staging]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.prod == 'true'
    runs-on: ubuntu-latest
    environment: prod         # set required reviewers in GitHub → Settings → Environments
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -input=false
        working-directory: terraform/environments/prod
      - run: |
          terraform apply -auto-approve -input=false \
            -var="ec2_public_key=${{ secrets.EC2_PUBLIC_KEY_PROD }}"
        working-directory: terraform/environments/prod
