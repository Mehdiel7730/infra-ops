# ansible/inventories/dev/hosts.ini
# Replace <IP> with the Elastic IP from Terraform output.
# In CI/CD this is injected automatically via the workflow.

[app_servers]
app-dev ansible_host=<DEV_EIP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/ec2-dev.pem

[app_servers:vars]
ansible_python_interpreter=/usr/bin/python3
environment=dev
