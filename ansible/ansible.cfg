[defaults]
inventory          = inventories/dev/hosts.ini
remote_user        = ubuntu
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
callback_whitelist = timer, profile_tasks

# SSH pipelining dramatically speeds up Ansible
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ServerAliveInterval=30
